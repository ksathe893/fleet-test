{{- $existing1 := lookup "v1" "Secret" .Release.Namespace "secret-one" }}
apiVersion: v1
kind: Secret
metadata:
  name: secret-one
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  password: {{ if $existing1 }}{{ index $existing1.data "password" | b64dec }}{{ else }}generated-by-helm{{ end }}
---
